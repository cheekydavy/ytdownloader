```yaml
services:
  - type: web
    name: youtube-downloader
    env: node
    buildCommand: |
      apt-get update && apt-get install -y python3 python3-pip python3-venv ffmpeg
      python3 -m venv /opt/render/venv
      source /opt/render/venv/bin/activate
      pip install -r requirements.txt
      npm install
    startCommand: "node server.js"
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: PATH
        value: /opt/render/venv/bin:/usr/local/bin:/usr/bin:/bin
      - key: PYTHONPATH
        value: /opt/render/venv/lib/python3/dist-packages:/usr/lib/python3/dist-packages
```
