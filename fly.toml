# fly.toml app configuration file generated for ytdownloader on 2026-04-26T12:05:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ytdownloader'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
